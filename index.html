<!DOCTYPE html>
<html lang="eng-US">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="images/moonsmw3.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <title>CozyForecast | Your Pixel-Art Weather Companion</title>
</head>

<body>
    <div class="background-gif">
        <img src="images/clouds2.gif" alt="Clouds" />
    </div>

    <div class="container">
        <div class="search-box">
            <i class="fa-solid fa-location-dot"></i>
            <input type="text" placeholder="Location" />
            <button><i class="fas fa-search"></i></button>
        </div>

        <div class="not-found">
            <img src="images/404.png" alt="Location not found" />
            <p>Location not found!</p>
        </div>

        <div class="weather-box">
            <img src="" alt="Weather icon" />
            <p class="temperature"></p>
            <p class="description"></p>

            <div class="country-info">
                <img id="country-flag" src="" alt="Country flag">
                <span id="country-name"></span>
            </div>
        </div>

        <div class="weather-details">
            <div class="humidity">
                <i class="fa-solid fa-water"></i>
                <div class="tex">
                    <span></span>
                    <p>Humidity</p>
                </div>
            </div>
            <div class="wind">
                <i class="fa-solid fa-wind"></i>
                <div class="tex">
                    <span></span>
                    <p>Wind Speed</p>
                </div>
            </div>
        </div>
    </div>

    <img src="images/bird.gif" alt="Bird" id="gif-container" />
    <div id="footer" class="minimalist-text">
    <a href="https://github.com/petersonwilliam97" target="_blank" rel="noopener noreferrer">
        petersonwilliam97
    </a>
</div>

    <script src="index.js"></script>
    <script>
        const gif = document.getElementById('gif-container');
        let x = window.innerWidth;
        let xSpeed = -2;

        function moveGif() {
            x += xSpeed;
            if (x + gif.clientWidth < -1000) {
                x = window.innerWidth;
            }
            gif.style.transform = `translateX(${x}px)`;
            requestAnimationFrame(moveGif);
        }
        moveGif();
    </script>
</body>
</html>
